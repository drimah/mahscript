<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>mahscript</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            padding: 15px; 
            width: 280px;
            background: #fff;
        }
        h3 { 
            margin: 0 0 15px 0; 
            font-size: 16px; 
            color: #202124;
            font-weight: 600;
        }
        h4 { 
            margin: 20px 0 8px 0; 
            font-size: 12px; 
            color: #5f6368;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        button { 
            display: block; 
            width: 100%; 
            margin-bottom: 6px; 
            padding: 10px 12px; 
            cursor: pointer; 
            border: 1px solid #dadce0; 
            background: #fff; 
            border-radius: 6px; 
            text-align: left;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover { 
            background: #f1f3f4;
            border-color: #80868b;
        }
        hr { 
            border: 0; 
            border-top: 1px solid #e8eaed; 
            margin: 15px 0; 
        }
        .skin-btn[data-skin="black"] { background: #0d0d0d; color: #fff; border-color: #0d0d0d; }
        .skin-btn[data-skin="midnight"] { background: #0f172a; color: #fff; border-color: #0f172a; }
        .skin-btn[data-skin="forest"] { background: #14532d; color: #fff; border-color: #14532d; }
        .skin-btn[data-skin="purple"] { background: #4c1d95; color: #fff; border-color: #4c1d95; }
        .skin-btn[data-skin="coffee"] { background: #3e2723; color: #fff; border-color: #3e2723; }
        .skin-btn[data-skin="silver"] { background: #263238; color: #fff; border-color: #263238; }
        .skin-btn[data-skin="default"] { background: #f8f9fa; color: #202124; }
    </style>
</head>
<body>
    <h3>📖 mahscript</h3>
    
    <h4>Google Docs</h4>
    <button class="skin-btn" data-skin="default">Tema Padrão</button>
    <button class="skin-btn" data-skin="black">Total Black</button>
    <button class="skin-btn" data-skin="midnight">Midnight Blue</button>
    <button class="skin-btn" data-skin="forest">Forest Dark</button>
    <button class="skin-btn" data-skin="purple">Royal Purple</button>
    <button class="skin-btn" data-skin="coffee">Coffee Brown</button>
    <button class="skin-btn" data-skin="silver">Metal Silver</button>
    
    <hr>
    
    <button id="btn-open-editor" style="background: #1a73e8; color: #fff; border-color: #1a73e8; text-align: center; font-weight: 600;">
        Abrir Editor MahScript
    </button>

    <script src="popup.js"></script>
</body>
</html>
